# =====================================================================
# NHS A&E Analytics — local development stack (ZERO-COST DEFAULT)
# Services: postgres · minio · localstack · airflow (init/web/scheduler)
#           ingestion (on-demand) · dbt (on-demand)
#
#   make up        # start everything
#   make down      # stop
#   make logs      # tail logs
#
# Airflow UI:  http://localhost:8080   (admin / admin)
# MinIO UI:    http://localhost:9001   (minioadmin / see .env)
# Postgres:    localhost:5432          (for Power BI / dbt / psql)
# =====================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.12
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
    PIP_ADDITIONAL_REQUIREMENTS: >-
      requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.3.0
      pandas==2.2.3 xlrd==2.0.1 openpyxl==3.1.5
      SQLAlchemy==2.0.36 psycopg2-binary==2.9.10 boto3==1.35.76
      pandera==0.21.0 python-dotenv==1.0.1
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./config:/opt/airflow/config
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ------------------------------------------------------------------
  # PostgreSQL: analytics warehouse (nhs_ae) + airflow metadata DB
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: nhs_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro   # runs once on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # MinIO: S3-compatible object storage = the immutable RAW ZONE
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: nhs_minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data          # was ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the raw bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: nhs_minio_init
    env_file: .env
    depends_on:
      minio:
        condition: service_started
    entrypoint: >-
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/$${RAW_BUCKET};
      mc version enable local/$${RAW_BUCKET};
      echo 'raw bucket ready';
      "

  # ------------------------------------------------------------------
  # LocalStack: AWS emulator for Terraform/IaC (Phase 10) — free
  # ------------------------------------------------------------------
  localstack:
    image: ${LOCALSTACK_IMAGE:-localstack/localstack:4.4.0}
    container_name: nhs_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,iam,secretsmanager,sts
      DEBUG: "0"
      LOCALSTACK_AUTH_TOKEN: ${LOCAL_STACK_AUTH_TOKEN}
    volumes:
       - localstackdata:/var/lib/localstack

  # ------------------------------------------------------------------
  # Airflow: init (db migrate + create admin) → web → scheduler
  # ------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: nhs_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname admin --lastname admin --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: nhs_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: nhs_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Ingestion app (Phase 5 code) — run on demand, not a long service
  #   docker compose run --rm ingestion python -m ingestion.run
  # ------------------------------------------------------------------
  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion.Dockerfile
    container_name: nhs_ingestion
    env_file: .env
    volumes:
      - ./ingestion:/app/ingestion
      - ./config:/app/config
      - ./data/raw:/app/data/raw
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]      # not started by `up`; run explicitly

  # ------------------------------------------------------------------
  # dbt (Phase 8 models) — run on demand
  #   docker compose run --rm dbt dbt build
  # ------------------------------------------------------------------
  dbt:
    build:
      context: .
      dockerfile: docker/dbt.Dockerfile
    container_name: nhs_dbt
    env_file: .env
    volumes:
      - ./dbt:/dbt
    working_dir: /dbt
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  pgdata:
  miniodata:
  localstackdata:

