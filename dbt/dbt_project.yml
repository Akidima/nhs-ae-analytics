# =====================================================================
# dbt project config. Full model tree is built in Phase 8.
# Layer → schema mapping mirrors Phase 3 §3.
# =====================================================================
name: "nhs_ae"
version: "1.0.0"
config-version: 2
profile: "nhs_ae"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]        # ICB map, CRS-trust list (reference data)
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  nhs_ae:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: ephemeral
    marts:
      +schema: marts
      +materialized: table

seeds:
  nhs_ae:
    +schema: reference
